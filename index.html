<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superset Embedded Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@superset-ui/embedded-sdk"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.25rem;
            margin: 24px 0;
            text-transform: capitalize;
            letter-spacing: -0.05em;
            font-weight: 800;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #my-dashboard {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .error-message {
            color: #e53e3e;
            padding: 20px;
            text-align: center;
            background: #fff5f5;
            border-radius: 8px;
            margin: 20px;
            border: 1px solid #feb2b2;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>dashboard superset</h1>
        <div id="my-dashboard">
            <p>Đang kết nối tới Server để lấy Token...</p>
        </div>
    </div>

    <script>
        const SUPERSET_DOMAIN = "http://165.99.16.68:8088";
        const DASHBOARD_ID = "c9eeb1a6-1838-48fd-b955-639ce200dc16";

        async function fetchTokenFromBackend() {
            const response = await fetch('http://localhost:3010/guest-token');

            if (!response.ok) {
                throw new Error(`Lỗi Server: ${response.statusText}`);
            }

            const data = await response.json();
            console.log("Đã nhận Token từ backend:", data.token);
            return data.token;
        }

        async function embed() {
            try {
                await supersetEmbeddedSdk.embedDashboard({
                    id: DASHBOARD_ID,
                    supersetDomain: SUPERSET_DOMAIN,
                    mountPoint: document.getElementById("my-dashboard"),

                    fetchGuestToken: fetchTokenFromBackend,

                    dashboardUiConfig: {
                        // hideTitle: true, // mở tùy chọn này để bỏ tiêu đề dashboard nhưng sẽ mất tùy chọn refresh
                        hideChartControls: true,
                        hideTab: true,
                        filters: {
                            expanded: false
                        }
                    }
                });
            } catch (error) {
                console.error("Lỗi nhúng Dashboard:", error);
                document.getElementById("my-dashboard").innerHTML =
                    `<div class="error-message">
                        <h3>Không tải được biểu đồ :(</h3>
                        <p>Chi tiết lỗi: ${error.message}</p>
                        <p>Hãy kiểm tra Console (F12) để xem chi tiết.</p>
                    </div>`;
            }
        }

        embed();
    </script>
</body>

</html>
